<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<script>
AFRAME.registerComponent('lock-after-detect', {
  init: function () {

    let marker = this.el;
    let model = document.querySelector('#model');

    marker.addEventListener('markerFound', () => {

      const worldPos = new THREE.Vector3();
      const worldRot = new THREE.Euler();

      marker.object3D.getWorldPosition(worldPos);
      worldRot.copy(marker.object3D.rotation);

      model.object3D.position.copy(worldPos);
      model.object3D.rotation.copy(worldRot);

      model.setAttribute('visible', true);

      marker.setAttribute('visible', false);
    });
  }
});
</script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene embedded arjs>

<a-marker preset="hiro" lock-after-detect>
</a-marker>

<a-entity
id="model"
gltf-model="1.glb"
scale="1 1 1"
visible="false">
</a-entity>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
