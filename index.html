<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}
</style>

</head>

<body>

<model-viewer
src="1.glb"

ar
ar-modes="webxr scene-viewer quick-look"

camera-controls="false"
auto-rotate="false"

placement="floor"
interaction-prompt="auto"
ar-scale="fixed"

shadow-intensity="1"
environment-image="neutral"

style="width:100vw;height:100vh;">
</model-viewer>

</body>
</html>
