<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
background:black;
font-family:sans-serif;
}

.ui{
position:fixed;
bottom:15px;
width:100%;
text-align:center;
z-index:10;
}

button{
padding:12px 18px;
margin:6px;
font-size:15px;
border-radius:12px;
border:none;
background:white;
}

.title{
position:fixed;
top:15px;
width:100%;
text-align:center;
color:white;
font-size:18px;
z-index:10;
}

</style>

</head>

<body>

<div class="title">
ARCHITECTURE AR VIEW
</div>

<model-viewer
id="viewer"
src="building.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
shadow-intensity="1"
environment-image="neutral"
exposure="1"
auto-rotate
style="width:100vw;height:100vh;"
></model-viewer>

<div class="ui">

<button onclick="startAR()">ENTER AR</button>
<button onclick="realScale()">REAL SCALE</button>
<button onclick="miniScale()">TABLE SCALE</button>
<button onclick="reset()">RESET</button>

</div>

<script>

const viewer=document.querySelector("#viewer");

function startAR(){
viewer.activateAR();
}

function realScale(){
viewer.scale="20 20 20"; // adjust to building size
}

function miniScale(){
viewer.scale="1 1 1";
}

function reset(){
location.reload();
}

</script>

</body>
</html>
