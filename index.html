<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{margin:0;overflow:hidden;}

.controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
z-index:999;
}

button{
padding:12px;
margin:4px;
font-size:16px;
border:none;
border-radius:8px;
background:black;
color:white;
}
</style>
</head>

<body>

<div class="controls">
<button onclick="zoomIn()">Zoom +</button>
<button onclick="zoomOut()">Zoom -</button>
<button onclick="rotateLeft()">⟲</button>
<button onclick="rotateRight()">⟳</button>
<button onclick="scaleUp()">Size +</button>
<button onclick="scaleDown()">Size -</button>
</div>

<a-scene
embedded
renderer="logarithmicDepthBuffer:true;"
vr-mode-ui="enabled:false"
arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled:false;">

<!-- MARKER -->
<a-marker preset="hiro" id="marker">

<a-entity
id="model"
gltf-model="1.glb"
scale="0.5 0.5 0.5"
position="0 0 0"
rotation="-90 0 0">
</a-entity>

</a-marker>

<!-- WORLD SPACE -->
<a-entity id="world"></a-entity>

<a-entity camera></a-entity>

</a-scene>

<script>

let marker=document.querySelector("#marker");
let model=document.querySelector("#model");
let world=document.querySelector("#world");

let placedModel=null;

/* ---------- PLACE MODEL ONCE ---------- */

marker.addEventListener("markerFound",()=>{

if(placedModel) return;

placedModel=model.cloneNode(true);

let pos=new THREE.Vector3();
marker.object3D.getWorldPosition(pos);

placedModel.setAttribute(
"position",
`${pos.x} ${pos.y} ${pos.z}`
);

world.appendChild(placedModel);

model.setAttribute("visible",false);

});

/* ---------- CONTROLS ---------- */

function zoomIn(){
if(!placedModel) return;
let p=placedModel.getAttribute("position");
placedModel.setAttribute("position",
`${p.x} ${p.y} ${p.z-0.2}`);
}

function zoomOut(){
if(!placedModel) return;
let p=placedModel.getAttribute("position");
placedModel.setAttribute("position",
`${p.x} ${p.y} ${p.z+0.2}`);
}

function rotateLeft(){
if(!placedModel) return;
let r=placedModel.getAttribute("rotation");
placedModel.setAttribute("rotation",
`${r.x} ${r.y-15} ${r.z}`);
}

function rotateRight(){
if(!placedModel) return;
let r=placedModel.getAttribute("rotation");
placedModel.setAttribute("rotation",
`${r.x} ${r.y+15} ${r.z}`);
}

function scaleUp(){
if(!placedModel) return;
let s=placedModel.getAttribute("scale");
placedModel.setAttribute("scale",
`${s.x+0.1} ${s.y+0.1} ${s.z+0.1}`);
}

function scaleDown(){
if(!placedModel) return;
let s=placedModel.getAttribute("scale");
placedModel.setAttribute("scale",
`${s.x-0.1} ${s.y-0.1} ${s.z-0.1}`);
}

</script>

</body>
</html>
