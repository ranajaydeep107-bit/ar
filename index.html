<script>

let model = document.querySelector("#model");
let marker = document.querySelector("#marker");

let fixed = false;

/* ================================
   FIX / UNFIX MODEL
================================ */

function toggleFix(){
    fixed = !fixed;
    alert(fixed ? "Model Fixed" : "Model Following Marker");
}

marker.addEventListener("markerFound",()=>{
    if(!fixed) model.object3D.visible=true;
});

marker.addEventListener("markerLost",()=>{
    if(fixed){
        model.object3D.visible=true;
    }
});

/* ================================
   BUTTON CONTROLS (EXACT SCALE)
================================ */

let scaleValue = 0.5;

function scaleUp(){
    scaleValue += 0.1;
    model.setAttribute("scale",
        scaleValue+" "+scaleValue+" "+scaleValue);
}

function scaleDown(){
    scaleValue -= 0.1;
    if(scaleValue < 0.1) scaleValue=0.1;

    model.setAttribute("scale",
        scaleValue+" "+scaleValue+" "+scaleValue);
}

/* ================================
   TOUCH CONTROLS
================================ */

let startX, startY;
let startDistance = null;
let startRotation = null;

/* ---- Distance Between Fingers ---- */

function getDistance(touches){
    let dx = touches[0].clientX - touches[1].clientX;
    let dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
}

/* ---- Angle Between Fingers ---- */

function getAngle(touches){
    let dx = touches[1].clientX - touches[0].clientX;
    let dy = touches[1].clientY - touches[0].clientY;
    return Math.atan2(dy,dx)*180/Math.PI;
}

/* ================================
   TOUCH START
================================ */

document.addEventListener("touchstart",(e)=>{

    if(e.touches.length==1){
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    }

    if(e.touches.length==2){
        startDistance = getDistance(e.touches);
        startRotation = getAngle(e.touches);
    }

});

/* ================================
   TOUCH MOVE
================================ */

document.addEventListener("touchmove",(e)=>{

    /* -------- MOVE MODEL (X,Y) -------- */
    if(e.touches.length==1){

        let dx = e.touches[0].clientX - startX;
        let dy = e.touches[0].clientY - startY;

        let pos = model.getAttribute("position");

        model.setAttribute("position",
            (pos.x + dx*0.001)+" "+
            (pos.y - dy*0.001)+" "+
            pos.z);

        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    }

    /* -------- PINCH ZOOM + ROTATE -------- */
    if(e.touches.length==2){

        let newDistance = getDistance(e.touches);
        let newAngle = getAngle(e.touches);

        /* ZOOM */
        let scaleChange = (newDistance - startDistance)*0.002;
        scaleValue += scaleChange;

        if(scaleValue<0.1) scaleValue=0.1;

        model.setAttribute("scale",
            scaleValue+" "+scaleValue+" "+scaleValue);

        startDistance = newDistance;

        /* ROTATE */
        let rot = model.getAttribute("rotation");
        let angleDiff = newAngle - startRotation;

        model.setAttribute("rotation",
            rot.x+" "+(rot.y+angleDiff)+" "+rot.z);

        startRotation = newAngle;
    }

});

</script>
