<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
background:black;
font-family:sans-serif;
overflow:hidden;
}

/* ---------- START SCREEN ---------- */

.startUI{
position:fixed;
bottom:30px;
width:100%;
text-align:center;
z-index:10;
}

button{
padding:14px 18px;
margin:6px;
font-size:16px;
border-radius:12px;
border:none;
background:white;
}

/* ---------- AR CONTROLS (HIDDEN FIRST) ---------- */

.arUI{
display:none;
position:fixed;
bottom:20px;
width:100%;
text-align:center;
z-index:20;
}

</style>
</head>

<body>

<!-- ================= MODEL VIEWER ================= -->

<model-viewer
id="viewer"
src="1.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate
shadow-intensity="1"
environment-image="neutral"
style="width:100vw;height:100vh;">
</model-viewer>


<!-- ================= START BUTTON ONLY ================= -->

<div class="startUI" id="startUI">
<button onclick="startAR()">START AR</button>
</div>


<!-- ================= AR CONTROLS ================= -->

<div class="arUI" id="arUI">

<button onclick="tableSize()">TABLE SIZE</button>
<button onclick="realSize()">REAL SIZE</button>
<br>

<button onclick="rotateLeft()">⟲</button>
<button onclick="rotateRight()">⟳</button>
<br>

<button onclick="heightUp()">HEIGHT +</button>
<button onclick="heightDown()">HEIGHT -</button>
<br>

<button onclick="removeModel()">REMOVE</button>

</div>


<script>

const viewer=document.querySelector("#viewer");
const startUI=document.querySelector("#startUI");
const arUI=document.querySelector("#arUI");

let height=0;

/* ================= ENTER AR ================= */

function startAR(){
viewer.activateAR();
}

/* SHOW BUTTONS ONLY AFTER AR STARTS */

viewer.addEventListener("ar-status", (event)=>{
if(event.detail.status==="session-started"){
startUI.style.display="none";
arUI.style.display="block";
}
});

/* ================= SCALE ================= */

function tableSize(){
viewer.scale="1 1 1";
}

function realSize(){
viewer.scale="15 15 15"; // adjust building real size
}

/* ================= ROTATION ================= */

function rotateLeft(){
viewer.cameraOrbit =
`${viewer.getCameraOrbit().theta - 15}deg 
${viewer.getCameraOrbit().phi}deg 
${viewer.getCameraOrbit().radius}m`;
}

function rotateRight(){
viewer.cameraOrbit =
`${viewer.getCameraOrbit().theta + 15}deg 
${viewer.getCameraOrbit().phi}deg 
${viewer.getCameraOrbit().radius}m`;
}

/* ================= HEIGHT CONTROL ================= */

function heightUp(){
height += 0.1;
viewer.style.transform=`translateY(-${height*100}px)`;
}

function heightDown(){
height -= 0.1;
viewer.style.transform=`translateY(-${height*100}px)`;
}

/* ================= REMOVE ================= */

function removeModel(){
viewer.style.display="none";
}

</script>

</body>
</html>
