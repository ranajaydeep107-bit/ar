<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Architecture AR Studio</title>

<!-- Model Viewer -->
<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
font-family:Arial;
background:black;
overflow:hidden;
}

/* ---------- INTRO SCREEN ---------- */

#intro{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
}

h1{
color:white;
letter-spacing:4px;
margin-bottom:40px;
font-weight:300;
}

#startBtn{
padding:18px 40px;
font-size:18px;
background:white;
color:black;
border:none;
border-radius:40px;
cursor:pointer;
}

/* ---------- AR VIEW ---------- */

model-viewer{
width:100%;
height:100vh;
display:none;
background:#000;
}

/* ---------- AR CONTROLS ---------- */

#controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:none;
gap:12px;
z-index:5;
}

.btn{
padding:12px 20px;
background:rgba(0,0,0,0.6);
color:white;
border:1px solid white;
border-radius:25px;
backdrop-filter:blur(10px);
cursor:pointer;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h1>ARCHITECTURE AR STUDIO</h1>
<button id="startBtn">START AR</button>
</div>

<!-- MODEL -->
<model-viewer
id="arModel"
src="model.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate
shadow-intensity="1"
exposure="1"
scale="1 1 1"
environment-image="neutral"
>
</model-viewer>

<!-- CONTROLS INSIDE AR -->
<div id="controls">

<button class="btn" onclick="realScale()">Real Size</button>

<button class="btn" onclick="tableScale()">Table Model</button>

<button class="btn" onclick="heightUp()">Height +</button>

<button class="btn" onclick="heightDown()">Height -</button>

</div>

<script>

const intro = document.getElementById("intro");
const model = document.getElementById("arModel");
const controls = document.getElementById("controls");

/* ---------- START AR ---------- */

document.getElementById("startBtn").onclick = () =>{

intro.style.display="none";

model.style.display="block";

/* show buttons only after AR starts */
setTimeout(()=>{
controls.style.display="flex";
},1500);

};

/* ---------- SCALE OPTIONS ---------- */

function realScale(){
model.scale="1 1 1";
}

function tableScale(){
model.scale="0.3 0.3 0.3";
}

/* ---------- HEIGHT CONTROL ---------- */

let height = 0;

function heightUp(){
height+=0.1;
model.style.transform=
`translateY(-${height*100}px)`;
}

function heightDown(){
height-=0.1;
model.style.transform=
`translateY(-${height*100}px)`;
}

</script>

</body>
</html>
