<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body{margin:0;overflow:hidden;}
#start{
position:fixed;
bottom:40px;
width:100%;
text-align:center;
z-index:10;
}
button{
padding:16px 22px;
font-size:18px;
border:none;
border-radius:12px;
background:white;
}
</style>

</head>

<body>

<div id="start">
<button onclick="enterAR()">START AR</button>
</div>

<a-scene
id="scene"
renderer="logarithmicDepthBuffer:true;"
xr-mode-ui="enabled:false"
webxr="requiredFeatures: hit-test,local-floor">

<a-camera></a-camera>

<!-- MODEL -->
<a-entity
id="model"
gltf-model="1.glb"
visible="false"
scale="1 1 1">
</a-entity>

</a-scene>

<script>

let placed=false;

const scene=document.querySelector("#scene");
const model=document.querySelector("#model");
const start=document.querySelector("#start");

function enterAR(){

scene.enterVR(); // start WebXR AR

start.style.display="none";

}

/* TAP TO PLACE ON REAL SURFACE */

scene.addEventListener("click",function(){

if(!placed){

const cam=document.querySelector("a-camera");

model.object3D.position.copy(
cam.object3D.position
);

model.object3D.position.z -= 2;

model.setAttribute("visible",true);

placed=true;

}

});

</script>

</body>
</html>
