<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{margin:0;overflow:hidden;}

.controls{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
z-index:999;
}

button{
padding:10px;
margin:3px;
background:black;
color:white;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<div class="controls">
<button onclick="rotateL()">⟲</button>
<button onclick="rotateR()">⟳</button>
<button onclick="scaleUp()">Size+</button>
<button onclick="scaleDown()">Size-</button>
</div>

<a-scene
embedded
renderer="logarithmicDepthBuffer:true;"
vr-mode-ui="enabled:false"
arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled:false;">

<!-- MARKER -->
<a-marker type="pattern" url="marker.patt" id="marker">

<a-entity
id="model"
gltf-model="1.glb"
rotation="-90 0 0"
scale="0.001 0.001 0.001">
</a-entity>

</a-marker>

<a-entity id="world"></a-entity>

<a-entity camera></a-entity>

</a-scene>

<script>

let marker=document.querySelector("#marker");
let model=document.querySelector("#model");
let world=document.querySelector("#world");

let placedModel=null;

/* ---------- PLACE MODEL ONCE ---------- */

marker.addEventListener("markerFound",()=>{

if(placedModel) return;

placedModel=model.cloneNode(true);

let pos=new THREE.Vector3();
marker.object3D.getWorldPosition(pos);

placedModel.setAttribute("position",
pos.x+" "+pos.y+" "+pos.z);

world.appendChild(placedModel);

});

/* ---------- CONTROLS ---------- */

function rotateL(){
if(!placedModel) return;
let r=placedModel.getAttribute("rotation");
placedModel.setAttribute("rotation",
r.x+" "+(r.y-15)+" "+r.z);
}

function rotateR(){
if(!placedModel) return;
let r=placedModel.getAttribute("rotation");
placedModel.setAttribute("rotation",
r.x+" "+(r.y+15)+" "+r.z);
}

function scaleUp(){
if(!placedModel) return;
let s=placedModel.getAttribute("scale");
placedModel.setAttribute("scale",
(s.x+0.0005)+" "+(s.y+0.0005)+" "+(s.z+0.0005));
}

function scaleDown(){
if(!placedModel) return;
let s=placedModel.getAttribute("scale");
placedModel.setAttribute("scale",
(s.x-0.0005)+" "+(s.y-0.0005)+" "+(s.z-0.0005));
}

</script>

</body>
</html>
