<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body{margin:0;overflow:hidden;}

#start{
position:fixed;
bottom:40px;
width:100%;
text-align:center;
z-index:10;
}

#lockBtn{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
display:none;
z-index:10;
}

button{
padding:14px 20px;
font-size:16px;
border-radius:10px;
border:none;
background:white;
}
</style>

</head>

<body>

<div id="start">
<button onclick="enterAR()">START AR</button>
</div>

<div id="lockBtn">
<button onclick="lockModel()">LOCK MODEL</button>
</div>

<a-scene
xr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer:true"
webxr="requiredFeatures: hit-test,local-floor">

<a-camera id="camera"></a-camera>

<a-entity
id="model"
gltf-model="1.glb"
visible="false"
scale="1 1 1">
</a-entity>

</a-scene>

<script>

const scene=document.querySelector("a-scene");
const model=document.querySelector("#model");
const start=document.querySelector("#start");
const lockBtn=document.querySelector("#lockBtn");

let placed=false;
let locked=false;

/* ---------- ENTER AR ---------- */

function enterAR(){
scene.enterVR();
start.style.display="none";
}

/* ---------- TAP TO PLACE ---------- */

scene.addEventListener("click",()=>{

if(!placed){

const cam=document.querySelector("#camera");

model.object3D.position.copy(cam.object3D.position);
model.object3D.position.z -= 2;

model.setAttribute("visible",true);

placed=true;
lockBtn.style.display="block";

}

});

/* ---------- LOCK MODEL ---------- */

function lockModel(){
locked=true;
lockBtn.style.display="none";
}

/* ---------- TOUCH CONTROLS ---------- */

let lastDist=null;
let lastAngle=null;

window.addEventListener("touchmove",(e)=>{

if(!placed || locked) return;

if(e.touches.length==1){

// DRAG MOVE
model.object3D.position.x += e.touches[0].movementX*0.002;
model.object3D.position.z += e.touches[0].movementY*0.002;

}

if(e.touches.length==2){

const dx=e.touches[0].clientX-e.touches[1].clientX;
const dy=e.touches[0].clientY-e.touches[1].clientY;

const dist=Math.sqrt(dx*dx+dy*dy);
const angle=Math.atan2(dy,dx);

/* SCALE */

if(lastDist){
let scale=model.object3D.scale.x+(dist-lastDist)*0.002;
scale=Math.max(0.1,scale);
model.object3D.scale.set(scale,scale,scale);
}

/* ROTATE */

if(lastAngle){
model.object3D.rotation.y += (angle-lastAngle);
}

lastDist=dist;
lastAngle=angle;

}

});

window.addEventListener("touchend",()=>{
lastDist=null;
lastAngle=null;
});

</script>

</body>
</html>
