<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
background:black;
font-family:sans-serif;
overflow:hidden;
}

/* MODEL hidden at start */
#viewer{
width:100vw;
height:100vh;
display:none;
}

/* START SCREEN */
.startUI{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.startUI button{
padding:18px 30px;
font-size:20px;
border-radius:12px;
border:none;
background:white;
}

/* AR CONTROLS */
.controls{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
z-index:10;
display:none;
}

button{
padding:12px;
margin:5px;
font-size:15px;
border:none;
border-radius:10px;
background:white;
}

</style>
</head>

<body>

<!-- START BUTTON ONLY -->
<div class="startUI" id="startUI">
<button onclick="startAR()">START AR</button>
</div>

<!-- MODEL VIEWER -->
<model-viewer
id="viewer"
src="1.glb"
ar
ar-modes="webxr"
camera-controls
environment-image="neutral"
shadow-intensity="1">
</model-viewer>

<!-- AR BUTTONS (appear AFTER AR starts) -->
<div class="controls" id="controls">

<button onclick="realSize()">REAL SIZE</button>
<button onclick="tableSize()">TABLE SIZE</button>

<br>

<button onclick="rotateLeft()">⟲</button>
<button onclick="rotateRight()">⟳</button>

<br>

<button onclick="heightUp()">HEIGHT +</button>
<button onclick="heightDown()">HEIGHT -</button>

<br>

<button onclick="resetModel()">REPLACE</button>

</div>

<script>

const viewer=document.getElementById("viewer");
const startUI=document.getElementById("startUI");
const controls=document.getElementById("controls");

let scale=1;
let rotation=0;
let height=0;

/* START AR */
function startAR(){

startUI.style.display="none";
viewer.style.display="block";

viewer.activateAR();

/* show buttons after camera opens */
setTimeout(()=>{
controls.style.display="block";
},2000);

}

/* SCALE */
function realSize(){
scale=20;
viewer.scale=`${scale} ${scale} ${scale}`;
}

function tableSize(){
scale=1;
viewer.scale=`${scale} ${scale} ${scale}`;
}

/* ROTATION */
function rotateLeft(){
rotation-=15;
viewer.orientation=`0deg ${rotation}deg 0deg`;
}

function rotateRight(){
rotation+=15;
viewer.orientation=`0deg ${rotation}deg 0deg`;
}

/* HEIGHT CONTROL */
function heightUp(){
height+=0.1;
viewer.style.transform=`translateY(-${height}m)`;
}

function heightDown(){
height-=0.1;
viewer.style.transform=`translateY(-${height}m)`;
}

/* RESET MODEL */
function resetModel(){
viewer.dismissPoster();
viewer.activateAR();
}

</script>

</body>
</html>
