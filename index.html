<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<title>AR Model Viewer</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
overflow:hidden;
}

/* START SCREEN */
#startScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
}

#startBtn{
padding:15px 40px;
font-size:18px;
border-radius:10px;
border:none;
}

/* MODEL */
model-viewer{
width:100vw;
height:100vh;
display:none;
}

/* CONTROL PANEL */
#controls{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
z-index:9999;
display:none;
}

button{
padding:12px 18px;
margin:5px;
font-size:15px;
border-radius:8px;
border:none;
}

</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
<button id="startBtn">START AR</button>
</div>

<!-- MODEL -->
<model-viewer
id="viewer"
src="model.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate
shadow-intensity="1"
scale="1 1 1">
</model-viewer>

<!-- CONTROL BUTTONS -->
<div id="controls">

<button onclick="realLife()">Real Size</button>
<button onclick="tableTop()">Table Mode</button>

<br>

<button onclick="zoomIn()">Zoom +</button>
<button onclick="zoomOut()">Zoom -</button>

<button onclick="moveUp()">Height +</button>
<button onclick="moveDown()">Height -</button>

<button onclick="rotate()">Rotate</button>
<button onclick="reset()">Reset</button>

</div>

<script>

const viewer = document.getElementById("viewer");
const startBtn = document.getElementById("startBtn");
const startScreen = document.getElementById("startScreen");
const controls = document.getElementById("controls");

/* START AR */
startBtn.onclick = () => {
startScreen.style.display="none";
viewer.style.display="block";
viewer.activateAR();
};

/* SHOW BUTTONS AFTER CAMERA START */
viewer.addEventListener("ar-status", (event)=>{
if(event.detail.status==="session-started"){
controls.style.display="block";
}
});

/* SCALE MODES */

function realLife(){
viewer.scale = "1 1 1";
}

function tableTop(){
viewer.scale = "0.2 0.2 0.2";
}

/* ZOOM */
function zoomIn(){
viewer.cameraOrbit="0deg 75deg 1m";
}

function zoomOut(){
viewer.cameraOrbit="0deg 75deg 3m";
}

/* HEIGHT CONTROL */
let height = 0;

function moveUp(){
height += 0.1;
viewer.style.transform =
`translateY(-${height*50}px)`;
}

function moveDown(){
height -= 0.1;
viewer.style.transform =
`translateY(-${height*50}px)`;
}

/* ROTATION */
function rotate(){
viewer.autoRotate = !viewer.autoRotate;
}

/* RESET */
function reset(){
viewer.cameraOrbit="0deg 75deg 2m";
viewer.scale="1 1 1";
viewer.style.transform="translateY(0px)";
height = 0;
}

</script>

</body>
</html>
