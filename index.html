<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}

/* ---------- UI ---------- */

.controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
z-index:999;
}

button{
padding:12px;
margin:4px;
font-size:16px;
border:none;
border-radius:8px;
background:black;
color:white;
}
</style>
</head>

<body>

<!-- ================= UI BUTTONS ================= -->

<div class="controls">
<button onclick="toggleFix()">Fix</button>
<button onclick="scaleUp()">Size +</button>
<button onclick="scaleDown()">Size -</button>
</div>

<!-- ================= AR SCENE ================= -->

<a-scene
embedded
renderer="logarithmicDepthBuffer:true;"
vr-mode-ui="enabled:false"
arjs="trackingMethod:best; sourceType:webcam; debugUIEnabled:false;">

<a-marker preset="hiro" id="marker">

<a-entity
id="model"
gltf-model="1.glb"
scale="0.5 0.5 0.5"
position="0 0 0"
rotation="-90 0 0">
</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<!-- ================= SCRIPT ================= -->

<script>

let model = document.querySelector("#model");
let marker = document.querySelector("#marker");

let fixed=false;
let scaleValue=0.5;

/* ================= FIX / UNFIX ================= */

function toggleFix(){
fixed=!fixed;
alert(fixed ? "Model Fixed" : "Model Follow Marker");
}

marker.addEventListener("markerLost",()=>{
if(fixed){
model.object3D.visible=true;
}
});

/* ================= EXACT SCALE ================= */

function scaleUp(){
scaleValue+=0.1;
applyScale();
}

function scaleDown(){
scaleValue-=0.1;
if(scaleValue<0.1) scaleValue=0.1;
applyScale();
}

function applyScale(){
model.setAttribute("scale",
scaleValue+" "+scaleValue+" "+scaleValue);
}

/* ================= TOUCH CONTROLS ================= */

let startX,startY;
let startDistance=null;
let startAngle=null;

/* ----- helpers ----- */

function distance(t){
let dx=t[0].clientX-t[1].clientX;
let dy=t[0].clientY-t[1].clientY;
return Math.sqrt(dx*dx+dy*dy);
}

function angle(t){
let dx=t[1].clientX-t[0].clientX;
let dy=t[1].clientY-t[0].clientY;
return Math.atan2(dy,dx)*180/Math.PI;
}

/* ================= TOUCH START ================= */

document.addEventListener("touchstart",(e)=>{

if(e.touches.length==1){
startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
}

if(e.touches.length==2){
startDistance=distance(e.touches);
startAngle=angle(e.touches);
}

});

/* ================= TOUCH MOVE ================= */

document.addEventListener("touchmove",(e)=>{

/* ---------- MOVE (X,Y) ---------- */
if(e.touches.length==1){

let dx=e.touches[0].clientX-startX;
let dy=e.touches[0].clientY-startY;

let pos=model.getAttribute("position");

model.setAttribute("position",
(pos.x+dx*0.001)+" "+
(pos.y-dy*0.001)+" "+
pos.z);

startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
}

/* ---------- PINCH ZOOM + ROTATE ---------- */
if(e.touches.length==2){

/* ZOOM */
let newDistance=distance(e.touches);
let change=(newDistance-startDistance)*0.002;

scaleValue+=change;
if(scaleValue<0.1) scaleValue=0.1;

applyScale();
startDistance=newDistance;

/* ROTATE */
let newAngle=angle(e.touches);
let rot=model.getAttribute("rotation");

model.setAttribute("rotation",
rot.x+" "+(rot.y+(newAngle-startAngle))+" "+rot.z);

startAngle=newAngle;
}

});

</script>

</body>
</html>
