<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
background:black;
font-family:Arial;
}

/* AR Model */
model-viewer{
width:100%;
height:100vh;
--progress-bar-color:white;
}

/* Buttons */
.controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:10px 15px;
font-size:14px;
border:none;
border-radius:8px;
background:#ffffffcc;
cursor:pointer;
}

button:active{
background:#ddd;
}

</style>
</head>

<body>

<model-viewer
id="model"
src="model.glb"
ar
ar-modes="scene-viewer webxr quick-look"
camera-controls
auto-rotate
shadow-intensity="1"
scale="0.3 0.3 0.3"
camera-orbit="0deg 75deg 2m"
interaction-prompt="auto">

<button slot="ar-button"
style="background:white;
border-radius:8px;
padding:10px 20px;
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);">
START AR
</button>

</model-viewer>

<!-- CONTROLS -->
<div class="controls">

<button onclick="realSize()">Real Life</button>

<button onclick="tableSize()">Table Model</button>

<button onclick="scaleUp()">Scale +</button>

<button onclick="scaleDown()">Scale -</button>

<button onclick="heightUp()">Height +</button>

<button onclick="heightDown()">Height -</button>

</div>

<script>

const model = document.getElementById("model");

let scaleValue = 0.3;
let heightValue = 0;

function applyScale(){
model.scale = `${scaleValue} ${scaleValue} ${scaleValue}`;
}

/* REAL SIZE */
function realSize(){
scaleValue = 1;
applyScale();
}

/* TABLE MODEL */
function tableSize(){
scaleValue = 0.25;
applyScale();
}

/* SCALE */
function scaleUp(){
scaleValue += 0.05;
applyScale();
}

function scaleDown(){
scaleValue -= 0.05;
if(scaleValue < 0.05) scaleValue = 0.05;
applyScale();
}

/* HEIGHT */
function heightUp(){
heightValue += 0.05;
model.style.transform =
`translateY(${heightValue*100}px)`;
}

function heightDown(){
heightValue -= 0.05;
model.style.transform =
`translateY(${heightValue*100}px)`;
}

</script>

</body>
</html>
