<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
}

/* CENTERED BUTTON PANEL */
.controls{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
z-index:999;
text-align:center;
white-space:nowrap;
}

button{
padding:10px 14px;
margin:3px;
font-size:14px;
border:none;
border-radius:8px;
background:black;
color:white;
}

</style>

</head>

<body>

<div class="controls">

<button onclick="placeModel()">PLACE</button>
<button onclick="realSize()">REAL</button>
<button onclick="tableSize()">TABLE</button>

<button onclick="rotateLeft()">⟲</button>
<button onclick="rotateRight()">⟳</button>

<button onclick="moveUp()">⬆</button>
<button onclick="moveDown()">⬇</button>

<button onclick="removeModel()">REMOVE</button>

</div>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer:true;"
arjs="trackingMethod:best;sourceType:webcam;debugUIEnabled:false;">

<!-- MARKER -->
<a-marker preset="hiro" id="marker">

<a-entity
id="model"
gltf-model="1.glb"
scale="0.5 0.5 0.5"
rotation="-90 0 0"
visible="false">
</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

const marker=document.querySelector("#marker");
const model=document.querySelector("#model");

let placed=false;
let rotationY=0;
let scaleValue=0.5;

/* ===========================
   PLACE MODEL
=========================== */

function placeModel(){

model.setAttribute("visible",true);
placed=true;

}

/* ===========================
   KEEP MODEL AFTER MARKER LOST
=========================== */

marker.addEventListener("markerLost",()=>{

if(placed){

model.object3D.position.copy(
marker.object3D.position
);

model.object3D.rotation.copy(
marker.object3D.rotation
);

document.querySelector("a-scene")
.appendChild(model);

}

});

/* ===========================
   SCALE
=========================== */

function realSize(){
scaleValue=8;
model.setAttribute("scale",
`${scaleValue} ${scaleValue} ${scaleValue}`);
}

function tableSize(){
scaleValue=0.5;
model.setAttribute("scale",
`${scaleValue} ${scaleValue} ${scaleValue}`);
}

/* ===========================
   ROTATION
=========================== */

function rotateLeft(){
rotationY-=15;
model.setAttribute("rotation",
`-90 ${rotationY} 0`);
}

function rotateRight(){
rotationY+=15;
model.setAttribute("rotation",
`-90 ${rotationY} 0`);
}

/* ===========================
   HEIGHT
=========================== */

function moveUp(){
let p=model.getAttribute("position");
model.setAttribute("position",
`${p.x} ${p.y+0.2} ${p.z}`);
}

function moveDown(){
let p=model.getAttribute("position");
model.setAttribute("position",
`${p.x} ${p.y-0.2} ${p.z}`);
}

/* ===========================
   REMOVE
=========================== */

function removeModel(){
model.setAttribute("visible",false);
placed=false;
}

</script>

</body>
</html>
