<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body{margin:0;overflow:hidden;}

.controls{
position:fixed;
bottom:15px;
width:100%;
text-align:center;
z-index:10;
}

button{
padding:12px;
margin:4px;
font-size:15px;
border-radius:10px;
border:none;
background:black;
color:white;
}
</style>

</head>

<body>

<div class="controls">

<button onclick="placeModel()">PLACE</button>
<button onclick="realSize()">REAL</button>
<button onclick="tableSize()">TABLE</button>

<button onclick="rotY(-15)">↺</button>
<button onclick="rotY(15)">↻</button>

<button onclick="up()">⬆</button>
<button onclick="down()">⬇</button>

<button onclick="remove()">REMOVE</button>

</div>


<a-scene
webxr="requiredFeatures: hit-test,local-floor"
renderer="colorManagement:true"
vr-mode-ui="enabled:false"
xr-mode-ui="enabled:true">

<a-camera position="0 1.6 0"></a-camera>

<a-entity id="model"
gltf-model="1.glb"
visible="false"
scale="0.5 0.5 0.5">
</a-entity>

</a-scene>

<script>

let model=document.querySelector("#model");

let placed=false;
let rot=0;
let height=0;
let scale=0.5;

/* PLACE MODEL ON REAL SURFACE */

function placeModel(){

let cam=document.querySelector("a-camera");

let pos=cam.object3D.position;

model.setAttribute("position",
`${pos.x} ${pos.y-1} ${pos.z-2}`);

model.setAttribute("visible",true);
placed=true;
}

/* SCALE */

function realSize(){
scale=8;
model.setAttribute("scale",`${scale} ${scale} ${scale}`);
}

function tableSize(){
scale=0.5;
model.setAttribute("scale",`${scale} ${scale} ${scale}`);
}

/* ROTATE */

function rotY(v){
rot+=v;
model.setAttribute("rotation",`0 ${rot} 0`);
}

/* HEIGHT */

function up(){
height+=0.2;
let p=model.getAttribute("position");
model.setAttribute("position",
`${p.x} ${p.y+0.2} ${p.z}`);
}

function down(){
height-=0.2;
let p=model.getAttribute("position");
model.setAttribute("position",
`${p.x} ${p.y-0.2} ${p.z}`);
}

/* REMOVE */

function remove(){
model.setAttribute("visible",false);
placed=false;
}

</script>

</body>
</html>
