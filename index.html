<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
background:black;
}

.controls{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
z-index:10;
}

button{
padding:12px;
margin:5px;
font-size:16px;
border:none;
border-radius:10px;
background:white;
}

</style>
</head>

<body>

<!-- PROFESSIONAL AR VIEWER -->

<model-viewer
id="viewer"
src="1.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate
shadow-intensity="1"
scale="1 1 1"
style="width:100vw;height:100vh;"
></model-viewer>

<div class="controls">

<button onclick="enterAR()">START AR</button>
<button onclick="realScale()">REAL SIZE</button>
<button onclick="smallScale()">SMALL</button>
<button onclick="removeModel()">REMOVE</button>

</div>

<script>

const viewer=document.querySelector("#viewer");

function enterAR(){
viewer.activateAR();
}

function realScale(){
viewer.scale="10 10 10"; // building size
}

function smallScale(){
viewer.scale="1 1 1";
}

function removeModel(){
viewer.style.display="none";
}

</script>

</body>
</html>
