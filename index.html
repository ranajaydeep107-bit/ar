<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
background:black;
font-family:sans-serif;
overflow:hidden;
}

.controls{
position:fixed;
bottom:15px;
width:100%;
text-align:center;
z-index:10;
}

button{
padding:10px 14px;
margin:4px;
font-size:14px;
border:none;
border-radius:10px;
background:white;
}

.title{
position:fixed;
top:15px;
width:100%;
text-align:center;
color:white;
font-size:18px;
z-index:10;
}

</style>
</head>

<body>

<div class="title">ARCHITECTURE AR VIEW</div>

<!-- ================= AR VIEWER ================= -->

<model-viewer
id="viewer"
src="1.glb"

ar
ar-modes="webxr scene-viewer quick-look"

ar-placement="floor"
ar-scale="fixed"

camera-controls
touch-action="pan-y"

shadow-intensity="1"
environment-image="neutral"
exposure="1"

style="width:100vw;height:100vh;">
</model-viewer>

<!-- ================= CONTROLS ================= -->

<div class="controls">

<button onclick="enterAR()">ENTER AR</button>

<br>

<button onclick="tableSize()">TABLE SIZE</button>
<button onclick="realSize()">REAL SIZE</button>

<br>

<button onclick="rotateLeft()">⟲</button>
<button onclick="rotateRight()">⟳</button>

<br>

<button onclick="heightUp()">HEIGHT +</button>
<button onclick="heightDown()">HEIGHT -</button>

<br>

<button onclick="rePlace()">REPLACE</button>

</div>

<script>

const viewer=document.querySelector("#viewer");

let height=0;
let rotation=0;

/* ---------- ENTER AR ---------- */

function enterAR(){
viewer.activateAR();
}

/* ---------- SCALE ---------- */

function tableSize(){
viewer.scale="1 1 1";
}

function realSize(){
viewer.scale="12 12 12";   // adjust for real building
}

/* ---------- ROTATION ---------- */

function rotateLeft(){
rotation-=15;
viewer.orientation=`0deg ${rotation}deg 0deg`;
}

function rotateRight(){
rotation+=15;
viewer.orientation=`0deg ${rotation}deg 0deg`;
}

/* ---------- HEIGHT ADJUST ---------- */

function heightUp(){
height+=0.1;
viewer.style.transform=`translateY(${-height*60}px)`;
}

function heightDown(){
height-=0.1;
viewer.style.transform=`translateY(${-height*60}px)`;
}

/* ---------- REPLACE MODEL ---------- */

function rePlace(){
viewer.activateAR(); // lets user tap new surface
}

</script>

</body>
</html>
