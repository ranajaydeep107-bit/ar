<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{margin:0;overflow:hidden;}

.controls{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
z-index:999;
}

button{
padding:10px;
margin:3px;
font-size:14px;
background:black;
color:white;
border:none;
border-radius:8px;
}
</style>
</head>

<body>

<div class="controls">
<button onclick="toggleFix()">Fix / Unfix</button>
<button onclick="setScale(1)">1:1</button>
<button onclick="setScale(0.5)">1:2</button>
<button onclick="setScale(0.25)">1:4</button>
<button onclick="setScale(2)">2X</button>
</div>

<a-scene
embedded
renderer="logarithmicDepthBuffer:true;"
vr-mode-ui="enabled:false"
arjs="trackingMethod: best; sourceType:webcam; debugUIEnabled:false;">

<a-marker preset="hiro" id="marker">

<a-entity
id="model"
gltf-model="1.glb"
scale="0.5 0.5 0.5"
position="0 0 0"
rotation="-90 0 0">
</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

let model=document.querySelector("#model");
let marker=document.querySelector("#marker");

let fixed=false;
let baseScale=0.5;

/* ---------- FIX BUTTON ---------- */

function toggleFix(){
fixed=!fixed;
}

/* ---------- EXACT SCALE ---------- */

function setScale(r){
baseScale=r;
model.setAttribute("scale",`${r} ${r} ${r}`);
}

/* ---------- TOUCH GESTURE CONTROL ---------- */

let startDistance=0;
let startRotation=0;
let lastAngle=0;

function getDistance(t1,t2){
let dx=t1.clientX-t2.clientX;
let dy=t1.clientY-t2.clientY;
return Math.sqrt(dx*dx+dy*dy);
}

function getAngle(t1,t2){
return Math.atan2(
t2.clientY-t1.clientY,
t2.clientX-t1.clientX
)*180/Math.PI;
}

document.addEventListener("touchstart",(e)=>{

if(e.touches.length==2){

startDistance=getDistance(
e.touches[0],
e.touches[1]
);

lastAngle=getAngle(
e.touches[0],
e.touches[1]
);

}

});

document.addEventListener("touchmove",(e)=>{

if(!fixed) return;

if(e.touches.length==2){

/* ---------- PINCH ZOOM ---------- */

let newDistance=getDistance(
e.touches[0],
e.touches[1]
);

let scaleChange=(newDistance-startDistance)*0.001;

baseScale+=scaleChange;

if(baseScale<0.05) baseScale=0.05;

model.setAttribute(
"scale",
`${baseScale} ${baseScale} ${baseScale}`
);

startDistance=newDistance;

/* ---------- ROTATION ---------- */

let newAngle=getAngle(
e.touches[0],
e.touches[1]
);

let angleChange=newAngle-lastAngle;

let rot=model.getAttribute("rotation");

model.setAttribute(
"rotation",
`${rot.x} ${rot.y+angleChange} ${rot.z}`
);

lastAngle=newAngle;

}

});

</script>

</body>
</html>
