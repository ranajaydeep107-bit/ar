<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
background:black;
font-family:sans-serif;
}

.title{
position:fixed;
top:10px;
width:100%;
text-align:center;
color:white;
font-size:18px;
z-index:20;
}

/* AR CONTROL PANEL */

.ui{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
z-index:20;
display:flex;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:10px 14px;
margin:4px;
font-size:14px;
border-radius:10px;
border:none;
background:white;
}

</style>

</head>

<body>

<div class="title">
ARCHITECTURE AR STUDIO
</div>

<model-viewer
id="viewer"
src="building.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
shadow-intensity="1"
environment-image="neutral"
exposure="1"
style="width:100vw;height:100vh;"
></model-viewer>

<!-- CONTROL BUTTONS (VISIBLE EVEN IN AR) -->

<div class="ui">

<button onclick="startAR()">ENTER AR</button>

<button onclick="realScale()">REAL SIZE</button>
<button onclick="miniScale()">TABLE SIZE</button>

<button onclick="rotateLeft()">↺</button>
<button onclick="rotateRight()">↻</button>

<button onclick="heightUp()">⬆ HEIGHT</button>
<button onclick="heightDown()">⬇ HEIGHT</button>

<button onclick="reset()">RESET</button>

</div>

<script>

const viewer = document.querySelector("#viewer");

/* ---------- ENTER AR ---------- */

function startAR(){
viewer.activateAR();
}

/* ---------- SCALE CONTROL ---------- */

function realScale(){
viewer.scale = "25 25 25";   // adjust real building scale
}

function miniScale(){
viewer.scale = "1 1 1";
}

/* ---------- ROTATION (BUILDING DIRECTION) ---------- */

let rotationY = 0;

function rotateLeft(){
rotationY -= 15;
viewer.orientation = `0deg ${rotationY}deg 0deg`;
}

function rotateRight(){
rotationY += 15;
viewer.orientation = `0deg ${rotationY}deg 0deg`;
}

/* ---------- HEIGHT FROM GROUND ---------- */

let height = 0;

function heightUp(){
height += 0.2;
viewer.style.transform =
`translateY(-${height*50}px)`;
}

function heightDown(){
height -= 0.2;
viewer.style.transform =
`translateY(-${height*50}px)`;
}

/* ---------- RESET ---------- */

function reset(){
location.reload();
}

</script>

</body>
</html>
