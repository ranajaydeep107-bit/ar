<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{margin:0;overflow:hidden;}

.controls{
position:fixed;
bottom:15px;
width:100%;
text-align:center;
z-index:999;
}

button{
padding:12px;
margin:4px;
font-size:15px;
border-radius:10px;
border:none;
background:black;
color:white;
}
</style>

</head>

<body>

<div class="controls">

<button onclick="place()">PLACE</button>
<button onclick="real()">REAL SIZE</button>
<button onclick="table()">TABLE SIZE</button>

<button onclick="rotateL()">↺</button>
<button onclick="rotateR()">↻</button>

<button onclick="up()">⬆</button>
<button onclick="down()">⬇</button>

<button onclick="removeModel()">REMOVE</button>

</div>


<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer:true;"
arjs="sourceType:webcam;debugUIEnabled:false;">

<a-marker preset="hiro" id="marker"></a-marker>

<a-entity
id="model"
gltf-model="1.glb"
scale="0.5 0.5 0.5"
rotation="-90 0 0"
visible="false">
</a-entity>

<a-entity camera></a-entity>

</a-scene>

<script>

const model=document.querySelector("#model");
const marker=document.querySelector("#marker");

let placed=false;
let rot=0;
let scale=0.5;

/* ===== PLACE MODEL IN WORLD ===== */

function place(){

if(!placed){

let pos=marker.object3D.position;
let rotm=marker.object3D.rotation;

model.object3D.position.copy(pos);
model.object3D.rotation.copy(rotm);

model.setAttribute("visible",true);
placed=true;
}
}

/* ===== SCALE ===== */

function real(){
scale=8;
model.setAttribute("scale",`${scale} ${scale} ${scale}`);
}

function table(){
scale=0.5;
model.setAttribute("scale",`${scale} ${scale} ${scale}`);
}

/* ===== ROTATION ===== */

function rotateL(){
rot-=15;
model.setAttribute("rotation",`-90 ${rot} 0`);
}

function rotateR(){
rot+=15;
model.setAttribute("rotation",`-90 ${rot} 0`);
}

/* ===== HEIGHT ===== */

function up(){
let p=model.getAttribute("position");
model.setAttribute("position",
`${p.x} ${p.y+0.2} ${p.z}`);
}

function down(){
let p=model.getAttribute("position");
model.setAttribute("position",
`${p.x} ${p.y-0.2} ${p.z}`);
}

/* ===== REMOVE ===== */

function removeModel(){
model.setAttribute("visible",false);
placed=false;
}

</script>

</body>
</html>
